<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The LookBook | MEISHA VERNELL</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-analytics-compat.js"></script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="main.css">
    
    <!-- Page Styles -->
    <link rel="stylesheet" href="gallery-firestore.css">
</head>
<body>
    <div class="noise"></div>

    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav-links" id="navLinks">
            <a href="portfolio.html" class="nav-link" role="link" tabindex="0">Portfolio</a>
            <a href="about.html" class="nav-link" role="link" tabindex="0">About</a>
            <a href="gallery-firestore.html" class="nav-link active" role="link" tabindex="0">The LookBook</a>
            <a href="index.html" class="nav-link nav-star" role="link" tabindex="0">★</a>
            <a href="asvab-firestore.html" class="nav-link" role="link" tabindex="0">ASVAB Prep</a>
            <a href="connect.html" class="nav-link" role="link" tabindex="0">Connect</a>
            <a href="portal.html" class="nav-link" role="link" tabindex="0">Portal</a>
        </div>

        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>

    <!-- Header -->
    <header class="gallery-header">
        <h1 class="gallery-title">THE LOOKBOOK</h1>
        <p class="gallery-subtitle"> Moving Forward: Life Behind the Code </p>
    </header>

    <!-- Album Grid (Instagram-style) - tap an album to see its photos/videos -->
    <section class="album-grid-section" id="albumGridSection">
        <div class="album-grid" id="albumGrid">
            <div class="loading">Loading albums...</div>
        </div>
    </section>

    <!-- Album Detail View -->
    <section class="album-detail-section" id="albumDetailSection" style="display: none;">
        <button class="back-to-albums" id="backToAlbums">← All Albums</button>
        <div class="album-detail-header">
            <h2 class="album-detail-title" id="albumDetailTitle"></h2>
            <p class="album-detail-subtitle" id="albumDetailSubtitle"></p>
        </div>
        <div class="carousel-wrap">
            <button class="carousel-arrow carousel-arrow-prev" id="carouselPrev" aria-label="Previous photo">‹</button>
            <div class="gallery-grid" id="galleryGrid">
                <div class="loading">Loading...</div>
            </div>
            <button class="carousel-arrow carousel-arrow-next" id="carouselNext" aria-label="Next photo">›</button>
        </div>
        <div class="carousel-counter" id="carouselCounter"></div>
    </section>

    <!-- Image/Video Modal -->
    <div class="image-modal" id="imageModal">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image-container">
            <img id="modalImage" src="" alt="">
            <video id="modalVideo" src="" controls playsinline style="display: none;"></video>
        </div>
        <div class="modal-info">
            <h3 id="modalCaption"></h3>
            <p id="modalDate"></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">© 2025 MEISHA VERNELL. ALL RIGHTS RESERVED.</p>
    </footer>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    
    <!-- Gallery Script -->
    <script>
        let allPhotos = [];
        let categories = [];
        let currentCategory = null;

        // ============================================
        // LOAD GALLERY + ALBUMS FROM FIRESTORE
        // ============================================
        async function loadGallery() {
            const grid = document.getElementById('albumGrid');

            try {
                const db = firebase.firestore();
                const [gallerySnap, catSnap] = await Promise.all([
                    db.collection('gallery').orderBy('uploadedAt', 'desc').get(),
                    db.collection('galleryCategories').orderBy('order', 'asc').get()
                ]);

                allPhotos = gallerySnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                categories = catSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                if (categories.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <p>Gallery coming soon!</p>
                            <p style="font-size: 0.8rem; color: var(--light-gray); margin-top: 10px;">
                                Start uploading photos from the admin dashboard.
                            </p>
                        </div>
                    `;
                    return;
                }

                renderAlbumGrid();
            } catch (error) {
                console.error('Error loading gallery:', error);
                grid.innerHTML = '<div class="empty-state"><p>Error loading gallery</p></div>';
            }
        }

        // ============================================
        // ALBUM GRID (Instagram-style)
        // ============================================
        function renderAlbumGrid() {
            const grid = document.getElementById('albumGrid');

            grid.innerHTML = categories.map(cat => {
                const photosInCat = allPhotos.filter(p => p.category === cat.key);
                const cover = photosInCat[0];
                const count = photosInCat.length;
                return `
                    <div class="album-tile" data-key="${cat.key}">
                        ${cover
                            ? (cover.type === 'video'
                                ? `<video class="album-tile-image" src="${cover.url}" muted loop autoplay playsinline></video>`
                                : `<img class="album-tile-image" src="${cover.url}" alt="${cat.label}" loading="lazy">`)
                            : `<div class="album-tile-image album-tile-empty"></div>`}
                        <div class="album-tile-overlay">
                            <div class="album-tile-title">${cat.label}</div>
                            ${cat.subtitle ? `<div class="album-tile-subtitle">${cat.subtitle}</div>` : ''}
                            <div class="album-tile-count">${count} ${count === 1 ? 'ITEM' : 'ITEMS'}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.album-tile').forEach(tile => {
                tile.addEventListener('click', () => openAlbum(tile.dataset.key));
            });
        }

        function openAlbum(key) {
            currentCategory = key;
            const cat = categories.find(c => c.key === key);

            document.getElementById('albumGridSection').style.display = 'none';
            document.getElementById('albumDetailSection').style.display = 'block';
            document.getElementById('albumDetailTitle').textContent = cat ? cat.label : key;
            document.getElementById('albumDetailSubtitle').textContent = cat ? (cat.subtitle || '') : '';

            window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
            renderGallery();
        }

        function closeAlbum() {
            currentCategory = null;
            document.getElementById('albumDetailSection').style.display = 'none';
            document.getElementById('albumGridSection').style.display = 'block';
        }

        document.getElementById('backToAlbums').addEventListener('click', closeAlbum);

        // ============================================
        // RENDER PHOTOS/VIDEOS WITHIN AN ALBUM
        // ============================================
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const filtered = allPhotos.filter(p => p.category === currentCategory);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>No photos in this album yet</p>
                    </div>
                `;
                carouselCounter.textContent = '';
                return;
            }

            grid.innerHTML = filtered.map((photo, index) => `
                <div class="gallery-item" data-index="${index}">
                    ${photo.type === 'video'
                        ? `<video class="gallery-image" src="${photo.url}" muted loop playsinline autoplay></video>`
                        : `<img src="${photo.url}" alt="${photo.caption || ''}" loading="lazy" class="gallery-image">`}
                    <div class="gallery-overlay">
                        <p class="gallery-caption">${photo.caption || ''}</p>
                        ${photo.date ? `<p class="gallery-date">${photo.date}</p>` : ''}
                    </div>
                </div>
            `).join('');

            // Add click listeners
            document.querySelectorAll('.gallery-item').forEach((item, index) => {
                item.addEventListener('click', () => {
                    openModal(filtered[index]);
                });
            });

            initCarousel(filtered.length);
        }

        // ============================================
        // CAROUSEL (swipe/scroll navigation)
        // ============================================
        const carouselPrev = document.getElementById('carouselPrev');
        const carouselNext = document.getElementById('carouselNext');
        const carouselCounter = document.getElementById('carouselCounter');

        function initCarousel(count) {
            if (count === 0) {
                carouselCounter.textContent = '';
                return;
            }

            updateCounter();

            document.getElementById('galleryGrid').onscroll = debounceScroll(updateCounter, 100);

            carouselPrev.onclick = () => scrollByOne(-1);
            carouselNext.onclick = () => scrollByOne(1);
        }

        function currentIndex() {
            const grid = document.getElementById('galleryGrid');
            const items = [...grid.querySelectorAll('.gallery-item')];
            if (items.length === 0) return 0;
            const center = grid.scrollLeft + grid.clientWidth / 2;
            let closest = 0;
            let closestDist = Infinity;
            items.forEach((item, i) => {
                const itemCenter = item.offsetLeft + item.offsetWidth / 2;
                const dist = Math.abs(itemCenter - center);
                if (dist < closestDist) {
                    closestDist = dist;
                    closest = i;
                }
            });
            return closest;
        }

        function updateCounter() {
            const grid = document.getElementById('galleryGrid');
            const items = grid.querySelectorAll('.gallery-item');
            if (items.length === 0) {
                carouselCounter.textContent = '';
                return;
            }
            carouselCounter.textContent = `${currentIndex() + 1} / ${items.length}`;
        }

        function scrollByOne(direction) {
            const grid = document.getElementById('galleryGrid');
            const items = [...grid.querySelectorAll('.gallery-item')];
            const target = Math.min(items.length - 1, Math.max(0, currentIndex() + direction));
            const item = items[target];
            if (item) {
                grid.scrollTo({
                    left: item.offsetLeft - (grid.clientWidth - item.offsetWidth) / 2,
                    behavior: 'smooth'
                });
            }
        }

        function debounceScroll(fn, wait) {
            let t;
            return () => {
                clearTimeout(t);
                t = setTimeout(fn, wait);
            };
        }

        // ============================================
        // MODAL
        // ============================================
        const modal = document.getElementById('imageModal');
        const modalClose = document.getElementById('modalClose');

        const modalImage = document.getElementById('modalImage');
        const modalVideo = document.getElementById('modalVideo');

        function openModal(photo) {
            if (photo.type === 'video') {
                modalVideo.src = photo.url;
                modalVideo.style.display = 'block';
                modalImage.style.display = 'none';
                modalImage.src = '';
            } else {
                modalImage.src = photo.url;
                modalImage.style.display = 'block';
                modalVideo.style.display = 'none';
                modalVideo.pause();
                modalVideo.src = '';
            }
            document.getElementById('modalCaption').textContent = photo.caption || '';
            document.getElementById('modalDate').textContent = photo.date || '';
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.body.style.overflow = '';
            modalVideo.pause();
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
    
    <!-- Navigation JS -->
    <script src="main.js" defer></script>
</body>
</html>
