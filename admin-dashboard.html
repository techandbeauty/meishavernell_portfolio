<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MEISHA VERNELL</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --black: #000000;
            --dark: #0a0a0a;
            --dark-gray: #1a1a1a;
            --mid-gray: #2a2a2a;
            --light-gray: #888888;
            --white: #ffffff;
            --gold: #c9a962;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        /* ============================================
           LOGIN PAGE
           ============================================ */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--dark-gray);
            border: 1px solid var(--mid-gray);
            padding: 50px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--light-gray);
            margin-bottom: 40px;
            letter-spacing: 0.1rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--black);
            border: 1px solid var(--mid-gray);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--black);
            border: 1px solid var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: transparent;
            color: var(--gold);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 20px;
        }

        /* ============================================
           ADMIN DASHBOARD
           ============================================ */
        .dashboard-container {
            display: none;
            min-height: 100vh;
            background: var(--black);
        }

        .dashboard-header {
            background: var(--dark-gray);
            border-bottom: 1px solid var(--mid-gray);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
            color: var(--gold);
        }

        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* Tabs */
        .dashboard-tabs {
            display: flex;
            border-bottom: 1px solid var(--mid-gray);
            padding: 0 40px;
            gap: 40px;
        }

        .tab-btn {
            padding: 15px 0;
            background: transparent;
            border: none;
            color: var(--light-gray);
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .tab-btn:hover {
            color: var(--gold);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        /* Content Section */
        .content-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.2rem;
            color: var(--gold);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Upload Form */
        .upload-form {
            background: var(--dark-gray);
            border: 1px solid var(--mid-gray);
            padding: 30px;
            margin-bottom: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--black);
            border: 1px solid var(--mid-gray);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* File Upload */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: var(--black);
            border: 2px dashed var(--gold);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: var(--gold);
        }

        .file-input-label:hover {
            background: rgba(201, 169, 98, 0.1);
        }

        .file-name {
            font-size: 0.8rem;
            color: var(--light-gray);
            margin-top: 8px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            background: var(--gold);
            color: var(--black);
            border: 1px solid var(--gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.15rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: transparent;
            color: var(--gold);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: transparent;
            color: var(--white);
            border-color: var(--mid-gray);
        }

        .btn.secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Gallery Items */
        .gallery-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery-item-card {
            background: var(--dark-gray);
            border: 1px solid var(--mid-gray);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gallery-item-card:hover {
            border-color: var(--gold);
        }

        .gallery-item-image {
            width: 100%;
            height: 200px;
            background: var(--black);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item-info {
            padding: 15px;
        }

        .gallery-item-caption {
            font-size: 0.85rem;
            color: var(--white);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .gallery-item-category {
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 10px;
        }

        .gallery-item-delete {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--mid-gray);
            color: #fca5a5;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-item-delete:hover {
            background: rgba(220, 38, 38, 0.1);
            border-color: #fca5a5;
        }

        /* Loading & Status */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--light-gray);
        }

        .status-message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .status-message.error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .dashboard-tabs {
                padding: 0 20px;
                gap: 20px;
                overflow-x: auto;
            }

            .tab-content {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .gallery-items {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .login-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1 class="login-title">ADMIN</h1>
            <p class="login-subtitle">Content Management System</p>
            <div class="login-error" id="loginError"></div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="dashboard-container" id="dashboardContainer">
        <div class="dashboard-header">
            <h1 class="dashboard-title">DASHBOARD</h1>
            <button class="logout-btn" id="logoutBtn">LOGOUT</button>
        </div>

        <!-- Tabs -->
        <div class="dashboard-tabs">
            <button class="tab-btn active" data-tab="gallery">Gallery</button>
            <button class="tab-btn" data-tab="asvab">ASVAB Content</button>
        </div>

        <!-- Gallery Tab -->
        <div class="tab-content active" id="gallery-tab">
            <div class="content-section">
                <h2 class="section-title">Upload Gallery Photo</h2>
                <form class="upload-form" id="galleryUploadForm">
                    <div class="status-message" id="galleryStatus"></div>

                    <div class="form-row full">
                        <div class="form-group">
                            <label>Photo</label>
                            <div class="file-input-wrapper">
                                <label class="file-input-label" for="galleryFile">
                                    <div>📷 Click to upload or drag and drop</div>
                                    <div class="file-name" id="galleryFileName"></div>
                                </label>
                                <input type="file" id="galleryFile" accept="image/*" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="galleryCaption">Caption</label>
                            <input type="text" id="galleryCaption" placeholder="Photo caption">
                        </div>
                        <div class="form-group">
                            <label for="galleryCategory">Category</label>
                            <select id="galleryCategory" required>
                                <option value="training">Training</option>
                                <option value="moments">Moments</option>
                                <option value="milestones">Milestones</option>
                                <option value="lifestyle">Lifestyle</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="galleryDate">Date</label>
                            <input type="date" id="galleryDate">
                        </div>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn" id="galleryUploadBtn">UPLOAD PHOTO</button>
                        <button type="reset" class="btn secondary">CLEAR</button>
                    </div>
                </form>
            </div>

            <div class="content-section">
                <h2 class="section-title">Your Photos</h2>
                <div class="loading" id="galleryLoading">Loading photos...</div>
                <div class="gallery-items" id="galleryItems"></div>
            </div>
        </div>

        <!-- ASVAB Tab -->
        <div class="tab-content" id="asvab-tab">
            <div class="content-section">
                <h2 class="section-title">Upload Study Material</h2>
                <form class="upload-form" id="asvabUploadForm">
                    <div class="status-message" id="asvabStatus"></div>

                    <div class="form-row full">
                        <div class="form-group">
                            <label for="asvabTitle">Study Material Title</label>
                            <input type="text" id="asvabTitle" placeholder="e.g., Arithmetic Reasoning Notes" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="asvabCategory">Subject</label>
                            <select id="asvabCategory" required>
                                <option value="arithmetic">Arithmetic Reasoning</option>
                                <option value="word-knowledge">Word Knowledge</option>
                                <option value="comprehension">Paragraph Comprehension</option>
                                <option value="math">Mathematics Knowledge</option>
                                <option value="science">General Science</option>
                                <option value="mechanical">Mechanical Comprehension</option>
                                <option value="electronics">Electronics Information</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Document (PDF/DOC)</label>
                            <div class="file-input-wrapper">
                                <label class="file-input-label" for="asvabFile">
                                    <div>📄 Click to upload</div>
                                    <div class="file-name" id="asvabFileName"></div>
                                </label>
                                <input type="file" id="asvabFile" accept=".pdf,.doc,.docx">
                            </div>
                        </div>
                    </div>

                    <div class="form-row full">
                        <div class="form-group">
                            <label for="asvabContent">Study Notes</label>
                            <textarea id="asvabContent" placeholder="Type your study notes here..."></textarea>
                        </div>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn" id="asvabUploadBtn">SAVE MATERIAL</button>
                        <button type="reset" class="btn secondary">CLEAR</button>
                    </div>
                </form>
            </div>

            <div class="content-section">
                <h2 class="section-title">Study Materials</h2>
                <div class="loading" id="asvabLoading">Loading materials...</div>
                <div id="asvabItems"></div>
            </div>
        </div>
    </div>

    <!-- Firebase Config & JS -->
    <script src="firebase-config.js"></script>
    <script>
        // ============================================
        // AUTHENTICATION
        // ============================================
        const loginContainer = document.getElementById('loginContainer');
        const dashboardContainer = document.getElementById('dashboardContainer');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check if user is logged in on page load
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                showDashboard();
            } else {
                showLogin();
            }
        });

        function showLogin() {
            loginContainer.style.display = 'flex';
            dashboardContainer.style.display = 'none';
        }

        function showDashboard() {
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'block';
            loadGalleryPhotos();
            loadASVABMaterials();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'LOGGING IN...';
            loginError.style.display = 'none';

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                showDashboard();
            } catch (error) {
                loginError.textContent = error.message;
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'LOGIN';
            }
        });

        logoutBtn.addEventListener('click', () => {
            firebase.auth().signOut();
            showLogin();
            loginForm.reset();
        });

        // ============================================
        // TAB SWITCHING
        // ============================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`${tabName}-tab`).classList.add('active');
            });
        });

        // ============================================
        // GALLERY UPLOAD
        // ============================================
        const galleryUploadForm = document.getElementById('galleryUploadForm');
        const galleryFile = document.getElementById('galleryFile');
        const galleryFileName = document.getElementById('galleryFileName');

        galleryFile.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            galleryFileName.textContent = fileName;
        });

        galleryUploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = galleryFile.files[0];
            if (!file) {
                showStatus('galleryStatus', 'Please select a photo', 'error');
                return;
            }

            const caption = document.getElementById('galleryCaption').value;
            const category = document.getElementById('galleryCategory').value;
            const date = document.getElementById('galleryDate').value;
            const uploadBtn = document.getElementById('galleryUploadBtn');

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'UPLOADING...';

            try {
                // Upload to Firebase Storage
                const timestamp = Date.now();
                const storageRef = firebase.storage().ref(`gallery/${timestamp}-${file.name}`);
                const snapshot = await storageRef.put(file);
                const photoUrl = await snapshot.ref.getDownloadURL();

                // Save to Firestore
                await firebase.firestore().collection('gallery').add({
                    url: photoUrl,
                    caption: caption,
                    category: category,
                    date: date || new Date().toISOString().split('T')[0],
                    uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    storagePath: `gallery/${timestamp}-${file.name}`
                });

                showStatus('galleryStatus', '✓ Photo uploaded successfully!', 'success');
                galleryUploadForm.reset();
                galleryFileName.textContent = '';
                loadGalleryPhotos();
            } catch (error) {
                showStatus('galleryStatus', `Error: ${error.message}`, 'error');
            }

            uploadBtn.disabled = false;
            uploadBtn.textContent = 'UPLOAD PHOTO';
        });

        async function loadGalleryPhotos() {
            const container = document.getElementById('galleryItems');
            const loading = document.getElementById('galleryLoading');

            try {
                const snapshot = await firebase.firestore()
                    .collection('gallery')
                    .orderBy('uploadedAt', 'desc')
                    .get();

                loading.style.display = 'none';

                if (snapshot.empty) {
                    container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--light-gray);">No photos yet. Upload your first photo above!</p>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `
                        <div class="gallery-item-card">
                            <div class="gallery-item-image">
                                <img src="${data.url}" alt="${data.caption}">
                            </div>
                            <div class="gallery-item-info">
                                <div class="gallery-item-caption">${data.caption || 'Untitled'}</div>
                                <div class="gallery-item-category">${data.category}</div>
                                <button type="button" class="gallery-item-delete" onclick="deleteGalleryPhoto('${doc.id}', '${data.storagePath}')">
                                    DELETE
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                loading.innerHTML = `<p style="color: #fca5a5;">Error loading photos: ${error.message}</p>`;
            }
        }

        async function deleteGalleryPhoto(docId, storagePath) {
            if (!confirm('Delete this photo?')) return;

            try {
                // Delete from Storage
                await firebase.storage().ref(storagePath).delete();
                // Delete from Firestore
                await firebase.firestore().collection('gallery').doc(docId).delete();
                loadGalleryPhotos();
                showStatus('galleryStatus', '✓ Photo deleted', 'success');
            } catch (error) {
                showStatus('galleryStatus', `Error: ${error.message}`, 'error');
            }
        }

        // ============================================
        // ASVAB UPLOAD
        // ============================================
        const asvabUploadForm = document.getElementById('asvabUploadForm');
        const asvabFile = document.getElementById('asvabFile');
        const asvabFileName = document.getElementById('asvabFileName');

        asvabFile.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            asvabFileName.textContent = fileName;
        });

        asvabUploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('asvabTitle').value;
            const category = document.getElementById('asvabCategory').value;
            const content = document.getElementById('asvabContent').value;
            const file = asvabFile.files[0];
            const uploadBtn = document.getElementById('asvabUploadBtn');

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'SAVING...';

            try {
                let fileUrl = '';
                if (file) {
                    const timestamp = Date.now();
                    const storageRef = firebase.storage().ref(`asvab/${timestamp}-${file.name}`);
                    const snapshot = await storageRef.put(file);
                    fileUrl = await snapshot.ref.getDownloadURL();
                }

                await firebase.firestore().collection('asvab').add({
                    title: title,
                    category: category,
                    content: content,
                    fileUrl: fileUrl || '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showStatus('asvabStatus', '✓ Study material saved!', 'success');
                asvabUploadForm.reset();
                asvabFileName.textContent = '';
                loadASVABMaterials();
            } catch (error) {
                showStatus('asvabStatus', `Error: ${error.message}`, 'error');
            }

            uploadBtn.disabled = false;
            uploadBtn.textContent = 'SAVE MATERIAL';
        });

        async function loadASVABMaterials() {
            const container = document.getElementById('asvabItems');
            const loading = document.getElementById('asvabLoading');

            try {
                const snapshot = await firebase.firestore()
                    .collection('asvab')
                    .orderBy('createdAt', 'desc')
                    .get();

                loading.style.display = 'none';

                if (snapshot.empty) {
                    container.innerHTML = '<p style="text-align: center; color: var(--light-gray);">No materials yet. Create your first study material above!</p>';
                    return;
                }

                container.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `
                        <div style="background: var(--dark-gray); border: 1px solid var(--mid-gray); padding: 20px; margin-bottom: 20px;">
                            <h3 style="color: var(--white); margin-bottom: 8px;">${data.title}</h3>
                            <p style="font-size: 0.8rem; color: var(--gold); margin-bottom: 12px; text-transform: uppercase;">${data.category}</p>
                            <p style="color: var(--light-gray); margin-bottom: 15px; line-height: 1.6;">${data.content.substring(0, 200)}...</p>
                            ${data.fileUrl ? `<p style="font-size: 0.85rem; color: var(--gold); margin-bottom: 15px;"><a href="${data.fileUrl}" target="_blank" style="color: var(--gold);">📄 View Document</a></p>` : ''}
                            <button onclick="deleteASVABMaterial('${doc.id}')" style="background: transparent; border: 1px solid var(--mid-gray); color: #fca5a5; padding: 8px 15px; cursor: pointer; font-size: 0.8rem;">DELETE</button>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                loading.innerHTML = `<p style="color: #fca5a5;">Error loading materials: ${error.message}</p>`;
            }
        }

        async function deleteASVABMaterial(docId) {
            if (!confirm('Delete this material?')) return;

            try {
                await firebase.firestore().collection('asvab').doc(docId).delete();
                loadASVABMaterials();
                showStatus('asvabStatus', '✓ Material deleted', 'success');
            } catch (error) {
                showStatus('asvabStatus', `Error: ${error.message}`, 'error');
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `status-message show ${type}`;
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
